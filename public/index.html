<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>うごく問いの地図 — D-02 セッション</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --red: #dc0451;
        --red-d: #c60449;
        --ink: #181818;
        --ink2: #505050;
        --muted: #a0a0a0;
        --bg: #ffffff;
        --surface: #f8f8f8;
        --border: #e0e0e0;
        --ja: dnp-shuei-gothic-gin-std, "Zen Kaku Gothic New", sans-serif;
        --en: roc-grotesk, "DM Sans", sans-serif;
        --c01: #8028ae;
        --c02: #5bbbb7;
        --c03: #ec801e;
        --c04: #ea6897;
        --c05: #2860b0;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: var(--ja);
        font-weight: 400;
        letter-spacing: 0.04em;
        line-height: 1.6;
        color: var(--ink);
        background: var(--bg);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        overflow-wrap: break-word;
      }
      /* top hero band (DeNA Red) */
      .top {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 16px 28px;
        background: var(--red);
        color: #fff;
        flex: 0 0 auto;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 14px;
      }
      .brand .en {
        font-family: var(--en);
        font-weight: 500;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .brand .ja {
        font-family: var(--ja);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.04em;
      }
      .sp {
        flex: 1;
      }
      .count {
        font-family: var(--en);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #fff;
      }
      .pill {
        font-family: var(--ja);
        font-weight: 500;
        font-size: 13px;
        padding: 8px 20px;
        border-radius: 40px;
        border: 1px solid currentColor;
        background: transparent;
        color: #fff;
        cursor: pointer;
        letter-spacing: 0.05em;
      }
      .pill:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .pill.on {
        background: #fff;
        color: var(--red);
      }
      .main {
        flex: 1 1 auto;
        display: flex;
        min-height: 0;
      }
      .stage {
        flex: 1.4 1 0;
        min-width: 0;
        position: relative;
        background: var(--bg);
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .clearbtn {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 5;
        font-family: var(--ja);
        font-weight: 600;
        font-size: 13px;
        padding: 9px 20px;
        border: 1px solid var(--ink);
        background: var(--bg);
        color: var(--ink);
        cursor: pointer;
        border-radius: 40px;
        letter-spacing: 0.05em;
      }
      .panel {
        flex: 0 0 40%;
        max-width: 580px;
        border-left: 1px solid var(--border);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .shead {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin: 0 0 18px;
      }
      .shead .en {
        font-family: var(--en);
        font-weight: 500;
        font-size: 17px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .shead .ja {
        font-family: var(--ja);
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.05em;
        color: var(--ink);
      }
      .form {
        padding: 26px 26px 28px;
        border-bottom: 1px solid var(--border);
        flex: 0 0 auto;
      }
      .form .shead .en {
        color: var(--c01);
      }
      textarea {
        width: 100%;
        min-height: 68px;
        resize: vertical;
        font-family: var(--ja);
        font-weight: 400;
        font-size: 15px;
        line-height: 1.6;
        letter-spacing: 0.04em;
        padding: 13px 14px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--ink);
        border-radius: 8px;
      }
      textarea:focus,
      input:focus {
        outline: none;
        border-color: var(--ink);
      }
      .lbl {
        font-family: var(--en);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink2);
        margin: 20px 0 11px;
      }
      .checks {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .ck {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 12px 20px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        text-align: left;
        border-radius: 40px;
        width: 100%;
      }
      .ck:hover {
        border-color: var(--cc);
      }
      .ck .num {
        font-family: var(--en);
        font-weight: 500;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--cc);
        flex: 0 0 auto;
        padding-top: 2px;
      }
      .ck .t {
        font-family: var(--ja);
        font-weight: 500;
        font-size: 13px;
        line-height: 1.5;
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .ck.on {
        background: var(--cc);
        border-color: var(--cc);
      }
      .ck.on .num,
      .ck.on .t {
        color: #fff;
      }
      .frow {
        display: flex;
        gap: 12px;
        align-items: stretch;
        margin-top: 22px;
      }
      .frow input {
        flex: 1;
        font-family: var(--ja);
        font-weight: 400;
        font-size: 14px;
        letter-spacing: 0.04em;
        padding: 12px 14px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--ink);
        border-radius: 8px;
      }
      .frow input.need {
        border-color: var(--red);
        box-shadow: inset 0 0 0 1px var(--red);
      }
      .post {
        font-family: var(--ja);
        font-weight: 600;
        font-size: 14px;
        padding: 12px 30px;
        border: 1px solid var(--ink);
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        border-radius: 40px;
        white-space: nowrap;
        letter-spacing: 0.04em;
      }
      .post:hover {
        background: var(--ink);
        color: #fff;
      }
      .stream {
        flex: 1 1 auto;
        overflow: auto;
        padding: 24px 26px;
      }
      .stream .shead .en {
        color: var(--c02);
      }
      .v {
        display: flex;
        gap: 14px;
        padding: 16px 2px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        align-items: flex-start;
      }
      .av {
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--en);
        font-size: 12px;
        font-weight: 500;
        color: #fff;
      }
      .vt {
        font-family: var(--ja);
        font-weight: 500;
        font-size: 14.5px;
        line-height: 1.6;
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .vm {
        font-family: var(--en);
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-top: 5px;
      }
      body.present .panel {
        display: none;
      }
      .node {
        cursor: pointer;
      }
      .ncode {
        font-family: var(--en);
        font-weight: 500;
        letter-spacing: 0.06em;
      }
      .ntitle {
        font-family: var(--ja);
        font-weight: 600;
        paint-order: stroke;
        stroke: var(--bg);
        stroke-width: 4px;
      }
      .nsub {
        font-family: var(--ja);
        font-weight: 500;
        fill: var(--muted);
        paint-order: stroke;
        stroke: var(--bg);
        stroke-width: 3px;
      }
      .vg {
        cursor: pointer;
      }
      .vinit {
        font-family: var(--en);
        font-weight: 500;
        pointer-events: none;
        fill: #fff;
      }
      .tip {
        position: absolute;
        pointer-events: none;
        max-width: 320px;
        background: var(--bg);
        border: 1px solid var(--ink);
        border-radius: 8px;
        padding: 12px 14px;
        font-family: var(--ja);
        font-weight: 400;
        font-size: 13.5px;
        line-height: 1.55;
        letter-spacing: 0.04em;
        color: var(--ink);
        opacity: 0;
        transition: opacity 0.1s;
        z-index: 6;
      }
      .tip .m {
        font-family: var(--en);
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-top: 7px;
      }
      /* ===== レスポンシブ：スマホは縦積み・フォーム主体（クエリ不要で自動） ===== */
      @media (max-width: 820px) {
        body {
          height: auto;
          min-height: 100vh;
          overflow-y: auto;
          overflow-x: hidden;
        }
        .top {
          padding: 12px 16px;
          gap: 10px;
        }
        .brand .ja {
          font-size: 17px;
        }
        .brand .en {
          display: none;
        }
        #present,
        #full {
          display: none;
        }
        .stage {
          display: none;
        } /* スマホは地図を出さない（投稿のみ） */
        .main {
          flex-direction: column;
        }
        .panel {
          display: block;
          flex: none;
          width: 100%;
          max-width: none;
          border-left: none;
        }
        .form {
          padding: 20px 18px;
        }
        .stream {
          flex: none;
          overflow: visible;
          padding: 20px 18px 32px;
        }
        .shead .en {
          font-size: 16px;
        }
        .shead .ja {
          font-size: 13px;
        }
        .ck {
          padding: 12px 18px;
        }
        .post {
          padding: 13px 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="brand"><span class="en">Moving Map of Questions</span><span class="ja">うごく問いの地図</span></div>
      <span class="sp"></span>
      <span class="count" id="count">Voices 0</span>
      <button class="pill" id="present">提示モード</button>
      <button class="pill" id="full">⛶ 全画面</button>
    </div>

    <div class="main">
      <div class="stage">
        <svg id="map" viewBox="0 0 1080 760" preserveAspectRatio="xMidYMid meet" role="img" aria-label="声によって発表が引き合う地図">
          <rect id="bg" x="0" y="0" width="1080" height="760" fill="transparent"></rect>
          <g id="edges"></g>
          <g id="voices"></g>
          <g id="nodes"></g>
        </svg>
        <div class="tip" id="tip"></div>
        <button class="clearbtn" id="clear" style="display: none" title="選択解除">✕ 解除</button>
      </div>

      <div class="panel">
        <div class="form">
          <div class="shead"><span class="en">Leave a Voice</span><span class="ja">声を残す</span></div>
          <textarea id="text" placeholder="聞きたかったこと、気づいたこと"></textarea>
          <div class="lbl">関連する発表（複数可）</div>
          <div class="checks" id="checks"></div>
          <div class="frow">
            <input id="name" placeholder="お名前・所属" />
            <button class="post" id="post">残す</button>
          </div>
        </div>
        <div class="stream">
          <div class="shead"><span class="en">Voices</span><span class="ja">声の流れ</span></div>
          <div id="list"></div>
        </div>
      </div>
    </div>

    <script>
      /* ===== リアルタイム共有：Firebase Firestore =====
   FB に Firebaseのconfigを入れると全端末で同期（放置でもデータが消えない / Blazeで実質0コスト）。
   空のままならこの端末内のローカル保存で動作。手順は「D-02_Firebase共有_セットアップ.md」を参照。 */
      const FB = {
        apiKey: "AIzaSyCTrNSm8N-x80Ezw2ggodeVTsX71b5Np8s",
        authDomain: "toi-map-63b19.firebaseapp.com",
        projectId: "toi-map-63b19",
        storageBucket: "toi-map-63b19.firebasestorage.app",
        messagingSenderId: "380027347529",
        appId: "1:380027347529:web:c359e1d983f52844e79598",
        measurementId: "G-XKY7QTZZCV",
      };
      /* ================================================ */

      const NODES = [
        { id: "01", code: "D-02-01", color: "#8028ae", title: "フィールドワークにおける学びの機会との出会い", sub: "出会いを支える学習環境の設計思想と実践" },
        {
          id: "02",
          code: "D-02-02",
          color: "#5bbbb7",
          title: "場の中で立ち上がる目的をことばにするデザイン",
          sub: "むかわ町におけるランブリングデザイン運動によるデザインリサーチ",
        },
        {
          id: "03",
          code: "D-02-03",
          color: "#ec801e",
          title: "現代日本の農山村での存在論的デザイン実践のための一考察",
          sub: "農山村を巡る諸領域の実践者・研究者たちの学際的な対話と協働",
        },
        { id: "04", code: "D-02-04", color: "#ea6897", title: "デザイントークのための Cafe Velosolex Project", sub: "Process1：天板のデザイン" },
        { id: "05", code: "D-02-05", color: "#2860b0", title: "意味生成の自治を支える思考のあり方の抽出", sub: "「360度探索法」における実践知の形式知化" },
      ];
      const N = (id) => NODES.find((n) => n.id === id) || {};
      const colorOf = (id) => N(id).color || "#999";
      const codeOf = (id) => N(id).code || id;
      const $ = (s) => document.querySelector(s);
      const SVGNS = "http://www.w3.org/2000/svg";
      const W = 1080,
        H = 760,
        CX = W / 2,
        CY = H / 2;

      let voices = [];
      let selRel = new Set(),
        sel = null;

      function authorKey(v) {
        return (v.name || "").trim().toLowerCase();
      }
      function hashStr(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
        return h;
      }
      function identColor(v) {
        const n = (v.name || "").trim();
        return n ? `hsl(${hashStr(n) % 360},45%,48%)` : "var(--muted)";
      }
      function initial(v) {
        const n = (v.name || "").replace(/\s+/g, "");
        return n ? n.slice(0, 1) : "";
      }
      function esc(s) {
        return (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]);
      }
      function wrap(s, n) {
        const out = [];
        let line = "";
        for (const ch of s) {
          if (ch === " " && line.length >= n) {
            out.push(line);
            line = "";
            continue;
          }
          line += ch;
          if (line.length >= n) {
            out.push(line);
            line = "";
          }
        }
        if (line.trim()) out.push(line);
        return out;
      }

      /* physics — settles then STOPS (定常では完全静止) */
      const P = {};
      NODES.forEach((n, i) => {
        const a = (i / NODES.length) * Math.PI * 2 - Math.PI / 2;
        P[n.id] = { x: CX + Math.cos(a) * 240, y: CY + Math.sin(a) * 200, vx: 0, vy: 0 };
      });
      function weights() {
        const Wm = {};
        NODES.forEach((a) => {
          Wm[a.id] = {};
          NODES.forEach((b) => (Wm[a.id][b.id] = 0));
        });
        voices.forEach((v) => {
          const r = v.rel || [];
          for (let i = 0; i < r.length; i++)
            for (let j = i + 1; j < r.length; j++) {
              if (Wm[r[i]] && Wm[r[i]][r[j]] != null) {
                Wm[r[i]][r[j]]++;
                Wm[r[j]][r[i]]++;
              }
            }
        });
        return Wm;
      }
      let Wm = weights();
      function step() {
        const ids = NODES.map((n) => n.id);
        for (const id of ids) {
          const p = P[id];
          for (const o of ids) {
            if (o === id) continue;
            const q = P[o];
            let dx = p.x - q.x,
              dy = p.y - q.y,
              d2 = dx * dx + dy * dy || 1;
            const d = Math.sqrt(d2),
              f = 64000 / d2;
            p.vx += (f * dx) / d;
            p.vy += (f * dy) / d;
          }
          for (const o of ids) {
            if (o === id) continue;
            const w = Wm[id][o];
            if (!w) continue;
            const q = P[o];
            let dx = q.x - p.x,
              dy = q.y - p.y,
              d = Math.hypot(dx, dy) || 1,
              f = 0.0014 * w * d;
            p.vx += (f * dx) / d;
            p.vy += (f * dy) / d;
          }
          p.vx += (CX - p.x) * 0.0017;
          p.vy += (CY - p.y) * 0.0017;
        }
        for (const id of ids) {
          const p = P[id];
          p.vx *= 0.84;
          p.vy *= 0.84;
          p.x += p.vx;
          p.y += p.vy;
          p.x = Math.max(160, Math.min(W - 160, p.x));
          p.y = Math.max(120, Math.min(H - 120, p.y));
        }
      }
      function centroid(rel) {
        if (!rel || !rel.length) return { x: CX, y: CY };
        let x = 0,
          y = 0;
        rel.forEach((id) => {
          x += P[id].x;
          y += P[id].y;
        });
        return { x: x / rel.length, y: y / rel.length };
      }
      function voiceTarget(v) {
        const r = v.rel || [];
        if (r.length >= 2) {
          const c = centroid(r);
          return { x: c.x + Math.cos(v._j) * v._jr, y: c.y + Math.sin(v._j) * v._jr };
        }
        const base = r.length === 1 ? P[r[0]] : { x: CX, y: CY };
        const ring = Math.floor((v._k || 0) / 9);
        const rad = r.length === 1 ? 54 + ring * 22 : 124 + ring * 26;
        return { x: base.x + Math.cos(v.orbA) * rad, y: base.y + Math.sin(v.orbA) * rad };
      }

      /* svg build */
      const gEdges = $("#edges"),
        gVoices = $("#voices"),
        gNodes = $("#nodes");
      const edgeEls = {};
      NODES.forEach((a, i) =>
        NODES.forEach((b, j) => {
          if (j <= i) return;
          const l = document.createElementNS(SVGNS, "line");
          l.setAttribute("stroke-linecap", "round");
          gEdges.appendChild(l);
          edgeEls[a.id + "-" + b.id] = l;
        }),
      );
      const nodeEls = {};
      NODES.forEach((n) => {
        const g = document.createElementNS(SVGNS, "g");
        g.setAttribute("class", "node");
        const lines = wrap(n.title, 15);
        const tspans = lines.map((ln, i) => `<tspan x="0" dy="${i === 0 ? 36 : 17}">${esc(ln)}</tspan>`).join("");
        const subY = 36 + lines.length * 17 + 2;
        g.innerHTML = `<circle r="15" fill="${n.color}" stroke="var(--bg)" stroke-width="3"></circle>
   <text class="ncode" text-anchor="middle" dy="-25" font-size="11" fill="${n.color}">${n.code}</text>
   <text class="ntitle" text-anchor="middle" font-size="12.5" fill="var(--ink)">${tspans}</text>
   <text class="nsub" text-anchor="middle" font-size="10" dy="${subY}">${esc(n.sub)}</text>`;
        g.addEventListener("click", (e) => {
          e.stopPropagation();
          selectNode(n.id);
        });
        gNodes.appendChild(g);
        nodeEls[n.id] = g;
      });

      const voiceEls = {};
      function addVoiceEl(v) {
        const g = document.createElementNS(SVGNS, "g");
        g.setAttribute("class", "vg");
        const lines = (v.rel || []).map(() => {
          const l = document.createElementNS(SVGNS, "line");
          l.setAttribute("stroke", "var(--muted)");
          l.setAttribute("stroke-opacity", "0.5");
          l.setAttribute("stroke-width", "1.2");
          g.appendChild(l);
          return l;
        });
        const hit = document.createElementNS(SVGNS, "circle");
        hit.setAttribute("r", "16");
        hit.setAttribute("fill", "transparent");
        g.appendChild(hit);
        const named = !!(v.name || "").trim();
        const badge = document.createElementNS(SVGNS, "circle");
        badge.setAttribute("r", named ? "11" : "6");
        badge.setAttribute("fill", identColor(v));
        badge.setAttribute("stroke", "var(--bg)");
        badge.setAttribute("stroke-width", "2");
        g.appendChild(badge);
        if (named) {
          const tx = document.createElementNS(SVGNS, "text");
          tx.setAttribute("class", "vinit");
          tx.setAttribute("text-anchor", "middle");
          tx.setAttribute("dy", "4");
          tx.setAttribute("font-size", "11");
          tx.textContent = initial(v);
          g.appendChild(tx);
        }
        g.addEventListener("mouseenter", (e) => showTip(v, e));
        g.addEventListener("mousemove", moveTip);
        g.addEventListener("mouseleave", hideTip);
        g.addEventListener("click", (e) => {
          e.stopPropagation();
          const k = authorKey(v);
          if (k) selectAuthor(k);
          else if ((v.rel || []).length === 1) selectNode(v.rel[0]);
          else clearSel();
        });
        gVoices.appendChild(g);
        voiceEls[v.id] = { g, lines };
      }

      /* tooltip */
      const tip = $("#tip"),
        stageEl = $(".stage");
      function showTip(v, e) {
        const codes = v.rel && v.rel.length ? v.rel.map(codeOf).join(" ・ ") : "〈全体〉";
        tip.innerHTML = `${esc(v.text)}<div class="m">${v.name ? esc(v.name) + " — " : ""}${codes}</div>`;
        tip.style.opacity = 1;
        moveTip(e);
      }
      function moveTip(e) {
        const r = stageEl.getBoundingClientRect();
        let x = e.clientX - r.left + 16,
          y = e.clientY - r.top + 16;
        x = Math.min(x, r.width - 350);
        y = Math.min(y, r.height - 100);
        tip.style.left = x + "px";
        tip.style.top = y + "px";
      }
      function hideTip() {
        tip.style.opacity = 0;
      }

      /* selection */
      function setSel(s) {
        sel = s;
        $("#clear").style.display = s ? "" : "none";
        renderList();
        paintOpacity();
      }
      function selectNode(id) {
        setSel(sel && sel.kind === "node" && sel.val === id ? null : { kind: "node", val: id });
      }
      function selectAuthor(k) {
        if (!k) return;
        setSel(sel && sel.kind === "author" && sel.val === k ? null : { kind: "author", val: k });
      }
      function clearSel() {
        setSel(null);
      }
      function voiceHot(v) {
        if (!sel) return true;
        return sel.kind === "node" ? (v.rel || []).includes(sel.val) : authorKey(v) === sel.val;
      }
      function paintOpacity() {
        let dimNode = () => 1;
        if (sel && sel.kind === "node") {
          const v = sel.val;
          dimNode = (id) => (id === v ? 1 : 0.26);
        } else if (sel && sel.kind === "author") {
          const tn = new Set();
          voices.forEach((v) => {
            if (authorKey(v) === sel.val) (v.rel || []).forEach((r) => tn.add(r));
          });
          dimNode = (id) => (tn.has(id) ? 1 : 0.32);
        }
        NODES.forEach((n) => nodeEls[n.id] && nodeEls[n.id].setAttribute("opacity", dimNode(n.id)));
        voices.forEach((v) => {
          const el = voiceEls[v.id];
          if (el) el.g.setAttribute("opacity", sel ? (voiceHot(v) ? 1 : 0.12) : 1);
        });
      }

      /* render — positions only updated while settling */
      const RAF = typeof requestAnimationFrame !== "undefined" ? requestAnimationFrame.bind(window) : (cb) => setTimeout(() => cb(Date.now()), 16);
      let settle = 0,
        looping = false;
      function reheat(n) {
        settle = Math.max(settle, n || 160);
        if (!looping) {
          looping = true;
          RAF(loop);
        }
      }
      function loop() {
        if (settle > 0) {
          step();
          settle--;
        }
        renderPositions();
        if (settle > 0) RAF(loop);
        else looping = false;
      }
      function renderPositions() {
        NODES.forEach((a, i) =>
          NODES.forEach((b, j) => {
            if (j <= i) return;
            const l = edgeEls[a.id + "-" + b.id],
              w = Wm[a.id][b.id];
            l.setAttribute("x1", P[a.id].x);
            l.setAttribute("y1", P[a.id].y);
            l.setAttribute("x2", P[b.id].x);
            l.setAttribute("y2", P[b.id].y);
            l.setAttribute("stroke", "var(--ink)");
            l.setAttribute("stroke-width", w ? Math.min(1 + w * 1.5, 11) : 0);
            l.setAttribute("stroke-opacity", w ? Math.min(0.1 + w * 0.06, 0.4) : 0);
          }),
        );
        voices.forEach((v) => {
          const el = voiceEls[v.id];
          if (!el) return;
          const t = voiceTarget(v);
          if (v.px == null) {
            v.px = t.x;
            v.py = t.y;
          }
          if (settle > 0) {
            v.px += (t.x - v.px) * 0.2;
            v.py += (t.y - v.py) * 0.2;
          } else {
            v.px = t.x;
            v.py = t.y;
          }
          el.g.setAttribute("transform", `translate(${v.px},${v.py})`);
          (v.rel || []).forEach((id, k) => {
            const l = el.lines[k];
            l.setAttribute("x1", 0);
            l.setAttribute("y1", 0);
            l.setAttribute("x2", P[id].x - v.px);
            l.setAttribute("y2", P[id].y - v.py);
          });
        });
        NODES.forEach((n) => {
          const p = P[n.id];
          nodeEls[n.id].setAttribute("transform", `translate(${p.x},${p.y})`);
          const touch = voices.filter((v) => (v.rel || []).includes(n.id)).length;
          nodeEls[n.id].querySelector("circle").setAttribute("r", 15 + Math.min(touch * 1.1, 15));
        });
        paintOpacity();
      }

      /* add voice */
      function addVoice(v, local) {
        if (voices.some((x) => x.id === v.id)) return;
        const r = v.rel || [];
        if (r.length < 2) {
          const key = r.length === 1 ? r[0] : "__all";
          v._k = voices.filter((x) => {
            const rr = x.rel || [];
            const kk = rr.length === 1 ? rr[0] : rr.length === 0 ? "__all" : null;
            return kk === key;
          }).length;
          v.orbA = (v._k || 0) * 2.399963;
        } else {
          v._j = (hashStr(v.id) % 628) / 100;
          v._jr = 12 + (hashStr(v.id) % 14);
        }
        voices.push(v);
        addVoiceEl(v);
        Wm = weights();
        renderList();
        $("#count").textContent = "Voices " + voices.length;
        reheat(160);
        if (local) {
          persist();
          bc && bc.postMessage({ t: "v", v: strip(v) });
          remoteInsert(v);
        }
      }
      function strip(v) {
        const { px, py, ...o } = v;
        return o;
      }

      /* list */
      function renderList() {
        const items = voices.slice().reverse();
        $("#list").innerHTML =
          items
            .map((v) => {
              const codes = (v.rel || []).map((id) => `<span style="color:${colorOf(id)}">${codeOf(id)}</span>`).join(" ・ ") || "〈全体〉";
              const named = !!(v.name || "").trim(),
                hot = !sel || voiceHot(v);
              const av = `<div class="av" style="background:${identColor(v)}">${named ? esc(initial(v)) : ""}</div>`;
              return `<div class="v" data-id="${v.id}" style="opacity:${hot ? 1 : 0.38}">${av}
      <div><div class="vt">${esc(v.text)}</div><div class="vm">${v.name ? esc(v.name) + "　/　" : ""}${codes}</div></div></div>`;
            })
            .join("") || `<div class="vm" style="color:var(--muted)">　</div>`;
      }
      $("#list").addEventListener("click", (e) => {
        const r = e.target.closest(".v");
        if (!r) return;
        const v = voices.find((x) => x.id === r.dataset.id);
        if (!v) return;
        const k = authorKey(v);
        if (k) selectAuthor(k);
        else if ((v.rel || []).length === 1) selectNode(v.rel[0]);
        else clearSel();
      });

      /* form */
      $("#checks").innerHTML = NODES.map(
        (n) => `<button class="ck" data-id="${n.id}" style="--cc:${n.color}"><span class="num">${n.code}</span><span class="t">${esc(n.title)}</span></button>`,
      ).join("");
      $("#checks").addEventListener("click", (e) => {
        const b = e.target.closest(".ck");
        if (!b) return;
        const id = b.dataset.id;
        if (selRel.has(id)) {
          selRel.delete(id);
          b.classList.remove("on");
        } else {
          selRel.add(id);
          b.classList.add("on");
        }
      });
      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }
      function submit() {
        const text = $("#text").value.trim(),
          name = $("#name").value.trim();
        if (!text) return $("#text").focus();
        if (!name) {
          const el = $("#name");
          el.focus();
          el.classList.add("need");
          setTimeout(() => el.classList.remove("need"), 1200);
          return;
        }
        addVoice({ id: uid(), text, rel: [...selRel], name, t: Date.now() }, true);
        $("#text").value = "";
        selRel.clear();
        document.querySelectorAll(".ck").forEach((b) => b.classList.remove("on"));
        $("#text").focus();
      }
      $("#post").addEventListener("click", submit);
      $("#text").addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submit();
      });

      /* controls */
      $("#bg").addEventListener("click", clearSel);
      $("#clear").addEventListener("click", clearSel);
      $("#present").addEventListener("click", (e) => {
        document.body.classList.toggle("present");
        e.target.classList.toggle("on");
      });
      $("#full").addEventListener("click", () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      });
      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") {
          if (e.key === "Escape") e.target.blur();
          return;
        }
        if (e.key === "Escape") clearSel();
        else if (e.key.toLowerCase() === "p") $("#present").click();
        else if (e.key.toLowerCase() === "f") $("#full").click();
      });

      /* view param */
      const view = new URLSearchParams(location.search).get("view");
      if (view === "submit") {
        $(".stage").style.display = "none";
        $(".panel").style.maxWidth = "100%";
        $(".panel").style.flex = "1";
      }
      if (view === "board") {
        $(".panel").style.display = "none";
      }
      /* スマホ/投稿専用は常時接続(WebSocket)を張らず、起動時に一度だけ読む＝同時接続を消費しない。
   投影や手元PCだけがライブ購読する → 100人でも同時接続は数本に収まる。 */
      const wantLive = view === "board" ? true : view === "submit" ? false : !(window.matchMedia && window.matchMedia("(max-width:820px)").matches);

      /* persistence + multi-tab（Firebase未設定時のローカル動作）*/
      function persist() {
        try {
          localStorage.setItem("d02voices", JSON.stringify(voices.map(strip)));
        } catch (e) {}
      }
      let bc = null;
      try {
        bc = new BroadcastChannel("d02voices");
        bc.onmessage = (ev) => {
          if (ev.data && ev.data.t === "v") addVoice(ev.data.v, false);
        };
      } catch (e) {}
      if (!FB.apiKey) {
        (function load() {
          try {
            (JSON.parse(localStorage.getItem("d02voices")) || []).forEach((v) => addVoice(v, false));
          } catch (e) {}
        })();
      }

      function loadScript(src) {
        return new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = res;
          s.onerror = rej;
          document.head.appendChild(s);
        });
      }

      /* Firebase Firestore（放置でも消えない / Blazeで実質0コスト）*/
      let fbDb = null;
      async function fbInit() {
        if (!FB.apiKey) return;
        await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
        await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js");
        window.firebase.initializeApp(FB);
        fbDb = window.firebase.firestore();
        const col = fbDb.collection("voices").orderBy("created_at");
        if (wantLive) {
          col.onSnapshot((s) =>
            s.docChanges().forEach((c) => {
              if (c.type === "added") addVoice(mapDoc(c.doc), false);
            }),
          );
        } else {
          const s = await col.get();
          s.forEach((d) => addVoice(mapDoc(d), false));
        }
      }
      function mapDoc(d) {
        const x = d.data() || {};
        const ts = x.created_at && x.created_at.toMillis ? x.created_at.toMillis() : Date.now();
        return { id: d.id, text: x.text, rel: x.rel || [], name: x.name || "", t: ts };
      }
      async function fbInsert(v) {
        if (!fbDb) return;
        try {
          await fbDb.collection("voices").doc(v.id).set({ text: v.text, rel: v.rel, name: v.name, created_at: window.firebase.firestore.FieldValue.serverTimestamp() });
        } catch (e) {}
      }
      function remoteInsert(v) {
        if (fbDb) fbInsert(v);
      }
      fbInit();

      renderList();
      reheat(200);
      window.__t = {
        addVoice,
        weights: () => Wm,
        voices: () => voices,
        step,
        renderPositions,
        setSettle: (n) => {
          settle = n;
        },
        P: () => P,
        selectAuthor,
        selectNode,
        clearSel,
        getSel: () => sel,
      };
    </script>
  </body>
</html>
